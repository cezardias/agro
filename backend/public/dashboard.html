<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Dashboard | AgroGestor</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .dashboard-container { max-width: 1000px; margin: 120px auto 60px; padding: 0 1.5rem; display: grid; grid-template-columns: 300px 1fr; gap: 2rem; }
    .profile-card { background: var(--bg-panel); border: 1px solid var(--border-light); border-radius: 1rem; padding: 2rem; text-align: center; height: fit-content;}
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; margin: 0 auto 1rem; }
    .dashboard-content { background: var(--bg-panel); border: 1px solid var(--border-light); border-radius: 1rem; padding: 2rem; }
    .listing-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .listing-item:last-child { border-bottom: none; }
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    .btn-danger:hover { background: #ef4444; color: #fff; }
    @media (max-width: 768px) {
      .dashboard-container { grid-template-columns: 1fr; margin-top: 180px; }
      .listing-item { flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav-content top-bar">
      <a href="/" class="logo">Agro<span>Gestor</span></a>
      <button class="mobile-menu-btn" onclick="document.querySelector('.nav-menu').classList.toggle('open')">⋮</button>
      <div class="nav-menu">
        <div class="nav-actions">
          <a href="/" class="btn btn-outline">Voltar para Home</a>
          <button onclick="logout()" class="btn btn-primary" style="background: transparent; border: 1px solid #ef4444; color: #ef4444; box-shadow: none;">Sair</button>
        </div>
      </div>
    </div>
  </header>

  <div class="dashboard-container" id="dash-root" style="display: none;">
    <div class="profile-card">
      <div class="profile-avatar" id="user-avatar">?</div>
      <h2 id="user-name">Nome do Usuário</h2>
      <p style="color: var(--text-muted); margin-bottom: 1rem;" id="user-type">Tipo</p>
      
      <div style="text-align: left; margin-top: 2rem;">
        <p><strong>Email:</strong> <span id="user-email"></span></p>
        <p><strong>WhatsApp:</strong> <span id="user-whats"></span></p>
        <p style="color: #fbbf24; margin-top: 1rem;"><strong>Reputação:</strong> ⭐ <span id="user-rep"></span></p>
      </div>
    </div>

    <div class="dashboard-content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2>Meus Anúncios</h2>
        <a href="/anunciar.html" class="btn btn-primary">Novo Anúncio</a>
      </div>
      
      <div id="my-listings">
        <p style="color: var(--text-muted)">Carregando...</p>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;

    document.addEventListener('DOMContentLoaded', () => {
      const stored = localStorage.getItem('agro_user');
      if (!stored) {
        window.location.href = '/login.html';
        return;
      }
      currentUser = JSON.parse(stored);
      document.getElementById('dash-root').style.display = 'grid';
      
      // Preenche dados do perfil
      document.getElementById('user-avatar').textContent = currentUser.name.charAt(0).toUpperCase();
      document.getElementById('user-name').textContent = currentUser.name;
      document.getElementById('user-type').textContent = currentUser.type.toUpperCase();
      document.getElementById('user-email').textContent = currentUser.email;
      document.getElementById('user-whats').textContent = currentUser.whatsapp;
      document.getElementById('user-rep').textContent = currentUser.reputation;
      
      loadMyListings();
    });

    async function loadMyListings() {
      const container = document.getElementById('my-listings');
      try {
        const res = await fetch(`/api/users/${currentUser.id}`);
        if (!res.ok) throw new Error('Erro');
        const user = await res.json();
        const listings = user.listings;
        
        if (!listings || listings.length === 0) {
          container.innerHTML = '<p style="color: var(--text-muted)">Você ainda não tem anúncios ativos.</p>';
          return;
        }
        
        container.innerHTML = '';
        listings.forEach(item => {
          const div = document.createElement('div');
          div.className = 'listing-item';
          div.innerHTML = `
            <div>
              <span class="tag" style="background: rgba(255,255,255,0.1); margin-bottom:0.5rem; display:inline-block">${item.transaction_type.toUpperCase()}</span>
              <h4>${item.title}</h4>
              <p style="color: var(--primary); font-weight: bold;">R$ ${parseFloat(item.price).toLocaleString('pt-BR')}</p>
            </div>
            <div>
              <a href="/produto.html?id=${item.id}" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">Ver</a>
              <button onclick="deleteListing(${item.id})" class="btn btn-danger" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">Excluir</button>
            </div>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        container.innerHTML = '<p style="color: #ef4444">Erro ao carregar anúncios.</p>';
      }
    }

    async function deleteListing(id) {
      if(!confirm('Tem certeza que deseja excluir este anúncio? Essa ação não pode ser desfeita.')) return;
      
      try {
        const res = await fetch(`/api/listings/${id}`, { method: 'DELETE' });
        if(res.ok) {
          alert('Anúncio excluído com sucesso.');
          loadMyListings();
        } else {
          alert('Erro ao excluir anúncio.');
        }
      } catch (err) {
        alert('Falha na comunicação.');
      }
    }

    function logout() {
      localStorage.removeItem('agro_user');
      window.location.href = '/';
    }
  </script>
</body>
</html>
