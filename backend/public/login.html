<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AgroGestor</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-container { max-width: 400px; margin: 100px auto; padding: 2rem; background: var(--bg-panel); border-radius: 1rem; border: 1px solid var(--border-light); }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;}
    .form-control { width: 100%; padding: 0.8rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-light); border-radius: 0.5rem; color: #fff; }
    .form-control:focus { outline: none; border-color: var(--primary); }
    .tabs { display: flex; border-bottom: 1px solid var(--border-light); margin-bottom: 2rem; }
    .tab { flex: 1; text-align: center; padding: 1rem; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: bold; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .error-msg { color: #ef4444; font-size: 0.85rem; margin-bottom: 1rem; display: none; text-align: center;}
  </style>
</head>
<body>
  <header>
    <div class="container nav-content top-bar">
      <a href="/" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M2 22l5-5"></path><path d="M7 17l-5-5"></path><path d="M12 2v20"></path><path d="M17 17l5-5"></path><path d="M22 22l-5-5"></path><path d="M7 7l5-5 5 5"></path></svg>
        Agro<span>Gestor</span>
      </a>
    </div>
  </header>

  <div class="auth-container">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Entrar</div>
      <div class="tab" onclick="switchTab('register')">Criar Conta</div>
    </div>
    
    <div id="error-box" class="error-msg"></div>

    <form id="login-form" class="tab-content active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" class="form-control" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.8rem;">Entrar</button>
    </form>

    <form id="register-form" class="tab-content">
      <div class="form-group">
        <label>Nome Completo</label>
        <input type="text" id="reg-name" class="form-control" placeholder="Seu nome" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" class="form-control" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="reg-password" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <div class="form-group">
        <label>WhatsApp</label>
        <input type="text" id="reg-whatsapp" class="form-control" placeholder="(00) 90000-0000" required>
      </div>
      <div class="form-group">
        <label>Tipo de Conta</label>
        <select id="reg-type" class="form-control" required>
          <option value="produtor">Produtor Rural</option>
          <option value="prestador">Prestador de Serviço</option>
          <option value="empresa">Empresa</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.8rem;">Criar Conta Grátis</button>
    </form>
  </div>

  <script>
    function switchTab(tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      if(tabId === 'login') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('login-form').classList.add('active');
      } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('register-form').classList.add('active');
      }
      document.getElementById('error-box').style.display = 'none';
    }

    const showError = (msg) => {
      const el = document.getElementById('error-box');
      el.textContent = msg;
      el.style.display = 'block';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      try {
        const res = await fetch('/api/users/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (res.ok) {
          localStorage.setItem('agro_user', JSON.stringify(data));
          window.location.href = '/dashboard.html';
        } else {
          showError(data.error || 'Erro ao entrar');
        }
      } catch (err) {
        showError('Falha na comunicação com o servidor.');
      }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        name: document.getElementById('reg-name').value,
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-password').value,
        whatsapp: document.getElementById('reg-whatsapp').value,
        type: document.getElementById('reg-type').value
      };
      
      try {
        const res = await fetch('/api/users/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        
        if (res.ok) {
          localStorage.setItem('agro_user', JSON.stringify(data));
          window.location.href = '/dashboard.html';
        } else {
          showError(data.error || 'Erro ao registrar');
        }
      } catch (err) {
        showError('Falha na comunicação com o servidor.');
      }
    });
  </script>
</body>
</html>
