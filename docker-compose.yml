services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agrogestor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - agro-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agrogestor"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/agrogestor
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  agro-postgres-data:
